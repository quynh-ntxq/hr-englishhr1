<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Uspeak English - Ôn nói mỗi ngày</title>
<meta name="theme-color" content="#002F87">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#002F87;
    --navy-dark:#001a4d;
    --accent:#FF3B30;
    --green:#1DB954;
    --orange:#FF6B35;
    --bg1:#0B2A6B;
    --bg2:#4A5CC9;
    --card:#ffffff;
    --text:#1f2430;
    --muted:#8a90a2;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.10), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(255,255,255,0.08), transparent 45%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: clamp(10px, 4vw, 30px);
  }

  .app{
    width:100%;
    max-width:760px;
    margin-top: clamp(6px, 2vh, 24px);
  }

  .card{
    background: var(--card);
    border-radius: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.08);
    padding: clamp(18px, 4vw, 34px);
    overflow:hidden;
    position:relative;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 4px;
  }
  .brand .logo-dot{
    width:14px;height:14px;border-radius:50%;
    background: linear-gradient(135deg, var(--accent), #ff8a00);
    flex-shrink:0;
  }
  .brand h1{
    font-family:'Poppins',sans-serif;
    font-weight:800;
    letter-spacing:0.5px;
    font-size: clamp(1.3em, 4.5vw, 1.7em);
    color: var(--navy);
    margin:0;
  }
  .subtitle{
    text-align:center;
    color: var(--muted);
    font-size: clamp(0.82em, 2.6vw, 0.95em);
    margin: 2px 0 18px;
  }

  /* SETTINGS GEAR + PANEL */
  .settings-toggle{
    position:absolute;
    top: clamp(14px, 3vw, 22px);
    right: clamp(14px, 3vw, 22px);
    width:36px;height:36px;
    border-radius:50%;
    border:none;
    background:#f0f1f6;
    color:var(--navy);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1em;
    transition: transform .3s ease, background .2s ease;
    z-index:2;
  }
  .settings-toggle.open{ transform: rotate(75deg); background:var(--navy); color:#fff; }

  .settings-panel{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: max-height .3s ease, opacity .25s ease, margin .3s ease;
    background:#f7f8fd;
    border-radius:16px;
  }
  .settings-panel.open{
    max-height:420px;
    opacity:1;
    margin-bottom:16px;
    padding: 14px 16px;
  }
  .settings-row{ margin-bottom:12px; }
  .settings-row:last-child{ margin-bottom:0; }
  .settings-row label{
    display:block;
    font-size:0.78em;
    font-weight:600;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:6px;
  }
  .settings-row select{
    width:100%;
    padding:9px 10px;
    border-radius:10px;
    border:1.5px solid #e2e5f0;
    background:#fff;
    color:var(--text);
    font-size:0.85em;
    font-family:'Inter',sans-serif;
  }
  .settings-row select:disabled{ color:var(--muted); }
  .speed-options{ display:flex; gap:8px; }
  .speed-btn{
    flex:1;
    border:1.5px solid #e2e5f0;
    background:#fff;
    color:#3a4160;
    font-weight:600;
    font-size:0.82em;
    padding:8px 6px;
    border-radius:10px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .speed-btn.active{
    background: var(--navy);
    border-color: var(--navy);
    color:#fff;
  }

  /* MODE SWITCH — segmented control */
  .mode-switch{
    display:flex;
    background: #f0f1f6;
    border-radius: 999px;
    padding: 5px;
    gap:4px;
    margin-bottom: 16px;
  }
  .mode-btn{
    flex:1;
    border:none;
    background:transparent;
    color: var(--navy);
    font-weight:600;
    font-family:'Inter',sans-serif;
    font-size: clamp(0.78em, 2.6vw, 0.92em);
    padding: 11px 10px;
    border-radius: 999px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition: all .25s ease;
  }
  .mode-btn.active{
    background: var(--navy);
    color:#fff;
    box-shadow: 0 6px 16px rgba(0,47,135,0.35);
  }

  /* TOPIC CHIPS */
  .topics-wrap{
    margin-bottom: 14px;
  }
  .topics-label{
    font-size:0.78em;
    color:var(--muted);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:8px;
    display:block;
  }
  .topic-chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    max-height: 180px;
    overflow-y:auto;
    padding: 2px 2px 6px;
  }
  .chip{
    border: 1.5px solid #e2e5f0;
    background:#fafbff;
    color:#3a4160;
    font-size: clamp(0.76em, 2.4vw, 0.85em);
    font-weight:600;
    padding: 8px 14px;
    border-radius: 999px;
    cursor:pointer;
    white-space:nowrap;
    transition: all .18s ease;
    user-select:none;
  }
  .chip:active{ transform: scale(0.96); }
  .chip.selected{
    background: var(--navy);
    border-color: var(--navy);
    color:#fff;
  }
  .chip.all-chip{
    background:#fff3ee;
    border-color:#ffd2c2;
    color:var(--accent);
  }
  .chip.all-chip.selected{
    background: var(--accent);
    border-color: var(--accent);
    color:#fff;
  }

  /* QUESTION AREA */
  .stage{
    background: linear-gradient(160deg, #f7f8fd, #eef0fb);
    border-radius: 18px;
    padding: clamp(20px, 5vw, 34px) clamp(16px, 4vw, 26px);
    text-align:center;
    min-height: 190px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 16px;
  }
  .question{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size: clamp(1.2em, 5vw, 1.7em);
    color: var(--text);
    line-height:1.35;
  }
  .question.compact{ font-size: clamp(1.05em, 4.2vw, 1.35em); }

  .replay-btn{
    border:none;
    background:#fff;
    color:var(--navy);
    width:38px;height:38px;
    border-radius:50%;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:0.95em;
    transition: transform .15s ease;
  }
  .replay-btn:active{ transform: scale(0.9); }

  .answer-block{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: max-height .35s ease, opacity .3s ease, margin .3s ease;
  }
  .answer-block.show{
    max-height:220px;
    opacity:1;
    margin-top:6px;
  }
  .answer{
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size: clamp(1.05em, 4vw, 1.25em);
    color: var(--green);
  }
  .ipa{
    font-size: clamp(0.85em, 3vw, 1em);
    color: var(--orange);
    font-weight:600;
    margin-top:6px;
  }

  .empty-note{
    color: var(--muted);
    font-style: italic;
    font-size:0.82em;
    text-align:center;
    margin: -6px 0 12px;
  }

  /* PROGRESS */
  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
  }
  .progress-bar{
    flex:1;
    height:8px;
    background:#eceefa;
    border-radius:999px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--navy), #5b6fd6);
    border-radius:999px;
    transition: width .3s ease;
  }
  .progress-text{
    font-size:0.82em;
    font-weight:700;
    color:var(--navy);
    white-space:nowrap;
    min-width:52px;
    text-align:right;
  }

  /* ACTION BUTTONS */
  .actions{
    display:flex;
    gap:12px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius: 16px;
    padding: 15px 10px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size: clamp(0.85em, 3vw, 1em);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition: transform .12s ease, box-shadow .2s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none; }
  .btn-primary{
    background: var(--navy);
    color:#fff;
    box-shadow: 0 8px 20px rgba(0,47,135,0.3);
  }
  .btn-secondary{
    background: var(--green);
    color:#fff;
    box-shadow: 0 8px 20px rgba(29,185,84,0.3);
  }

  footer{
    text-align:center;
    color:rgba(255,255,255,0.75);
    font-size:0.78em;
    margin-top:16px;
    padding-bottom: 8px;
  }

  @media (max-width:480px){
    .actions{ flex-direction:column; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="card">
      <button class="settings-toggle" id="settingsToggle" title="Cài đặt giọng đọc"><i class="fa-solid fa-gear"></i></button>
      <div class="brand"><span class="logo-dot"></span><h1>USPEAK ENGLISH</h1></div>
      <p class="subtitle">Hãy ôn tập mỗi ngày để có kết quả tốt nhất nhé ✨</p>

      <div class="settings-panel" id="settingsPanel">
        <div class="settings-row">
          <label>Giọng đọc tiếng Việt</label>
          <select id="voiceViSelect"></select>
        </div>
        <div class="settings-row">
          <label>Giọng đọc tiếng Anh</label>
          <select id="voiceEnSelect"></select>
        </div>
        <div class="settings-row">
          <label>Tốc độ đọc câu hỏi tiếng Việt</label>
          <div class="speed-options">
            <button class="speed-btn" data-speed="0.8">Chậm</button>
            <button class="speed-btn" data-speed="1">Vừa</button>
            <button class="speed-btn" data-speed="1.3">Nhanh</button>
          </div>
        </div>
      </div>

      <div class="mode-switch">
        <button class="mode-btn active" id="modeFlashcard"><i class="fa-solid fa-layer-group"></i> Luyện mẫu câu</button>
        <button class="mode-btn" id="modeListen"><i class="fa-solid fa-bolt"></i> Phản xạ nhanh</button>
      </div>

      <div class="topics-wrap">
        <span class="topics-label">Chọn chủ đề</span>
        <div class="topic-chips" id="topicChips">Đang tải dữ liệu...</div>
      </div>

      <div class="stage">
        <div class="question" id="question">Chưa có dữ liệu.</div>
        <button class="replay-btn" id="replayBtn" title="Nghe lại"><i class="fa-solid fa-volume-high"></i></button>
        <div class="answer-block" id="answerBlock">
          <div class="answer" id="answer"></div>
          <div class="ipa" id="ipa"></div>
        </div>
      </div>

      <div class="empty-note" id="emptyNote"></div>

      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0/0</div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="showAnswerBtn" disabled><i class="fa-solid fa-eye"></i> Xem đáp án</button>
        <button class="btn btn-secondary" id="nextBtn" disabled><i class="fa-solid fa-shuffle"></i> Câu tiếp theo</button>
      </div>
    </div>
    <footer>Uspeak English &middot; Luyện nói mỗi ngày, mọi lúc, mọi nơi</footer>
  </div>

<script>
  // ===================
  // DỮ LIỆU & TRẠNG THÁI
  // ===================
  let flashcardData = [];
  let listenData = [];
  let filteredData = [];
  let usedIndexes = [];
  let currentIndex = -1;
  let mode = 'flashcard';
  let selectedTopics = new Set();
  let allSelected = true;

  const possibleFiles = ['Uspeak_8Units.xlsx', 'data.xlsx'];

  // ===================
  // TTS
  // ===================
  let cachedVoices = [];
  let canAutoSpeak = false;
  let pendingSpeakText = null;
  let pendingSpeakLang = null;
  let selectedViVoice = localStorage.getItem('uspeak_vi_voice') || '';
  let selectedEnVoice = localStorage.getItem('uspeak_en_voice') || '';
  let viSpeedPreset = parseFloat(localStorage.getItem('uspeak_vi_speed') || '1');

  const refreshVoices = () => { cachedVoices = speechSynthesis.getVoices(); populateVoiceSelectors(); };
  speechSynthesis.onvoiceschanged = refreshVoices; refreshVoices();
  setTimeout(refreshVoices, 400); // fallback: một số trình duyệt không bắn sự kiện voiceschanged

  function pickVoice(langCode) {
    if (!cachedVoices.length) refreshVoices();
    const matches = cachedVoices.filter(v => v.lang?.toLowerCase().startsWith(langCode.slice(0, 2).toLowerCase()));
    if (matches.length === 0) return null;
    return matches.find(v => v.localService) || matches[0];
  }

  function getVoiceByName(name) {
    if (!name) return null;
    return cachedVoices.find(v => v.name === name) || null;
  }

  function fillVoiceSelect(id, langPrefix, selectedName) {
    const sel = document.getElementById(id);
    if (!sel) return;
    const voices = cachedVoices.filter(v => v.lang?.toLowerCase().startsWith(langPrefix));
    sel.innerHTML = '';
    if (voices.length === 0) {
      const opt = document.createElement('option');
      opt.value = ''; opt.innerText = 'Đang tải giọng đọc...';
      sel.appendChild(opt);
      sel.disabled = true;
      return;
    }
    sel.disabled = false;
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.innerText = v.name + (v.localService ? '' : ' (cần mạng)');
      sel.appendChild(opt);
    });
    const hasSelected = voices.some(v => v.name === selectedName);
    sel.value = hasSelected ? selectedName : (voices.find(v => v.localService)?.name || voices[0].name);
  }

  function populateVoiceSelectors() {
    fillVoiceSelect('voiceViSelect', 'vi', selectedViVoice);
    fillVoiceSelect('voiceEnSelect', 'en', selectedEnVoice);
  }

  function speakText(text, langCode, rate = 1) {
    if (!text) return;
    try {
      if (speechSynthesis.speaking) speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = langCode;
      u.rate = rate;
      let v = null;
      if (langCode === 'vi-VN') v = getVoiceByName(document.getElementById('voiceViSelect')?.value) || pickVoice(langCode);
      else v = getVoiceByName(document.getElementById('voiceEnSelect')?.value) || pickVoice(langCode);
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch (e) { console.warn('TTS error:', e); }
  }

  const enableAutoSpeakOnce = () => {
    if (!canAutoSpeak) {
      canAutoSpeak = true;
      if (pendingSpeakText) {
        const text = pendingSpeakText, lang = pendingSpeakLang;
        pendingSpeakText = null; pendingSpeakLang = null;
        speakText(text, lang, lang === 'vi-VN' ? viSpeedPreset : 1);
      }
    }
    document.removeEventListener('click', enableAutoSpeakOnce, true);
    document.removeEventListener('keydown', enableAutoSpeakOnce, true);
  };
  document.addEventListener('click', enableAutoSpeakOnce, true);
  document.addEventListener('keydown', enableAutoSpeakOnce, true);

  // ===================
  // HELPERS
  // ===================
  function parseTopic(raw) {
    if (!raw) return { order: Infinity, name: '', raw: '' };
    const s = String(raw).trim();
    const m = s.match(/^\s*(\d+)\s*-\s*(.+)$/);
    if (m) return { order: parseInt(m[1], 10), name: m[2].trim(), raw: s };
    return { order: Infinity, name: s, raw: s };
  }

  // ===================
  // NẠP EXCEL
  // ===================
  async function tryLoadExcelFiles() {
    for (const file of possibleFiles) {
      try {
        const res = await fetch(file);
        if (!res.ok) continue;
        const buffer = await res.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array' });

        const sheet1Name = workbook.SheetNames[0];
        const json1 = XLSX.utils.sheet_to_json(workbook.Sheets[sheet1Name]);
        flashcardData = json1.map(row => {
          const parsed = parseTopic(row['CHU_DE']);
          return {
            topicRaw: parsed.raw, topicName: parsed.name, topicOrder: parsed.order,
            vi: (row['DE_BAI'] ?? '').toString().trim(),
            en: (row['DAP_AN'] ?? '').toString().trim(),
            ipa: (row['IPA'] ?? '').toString().trim()
          };
        }).filter(i => i.topicName && i.vi && i.en);

        const sheet2Name = workbook.SheetNames.find(n => n !== sheet1Name);
        if (sheet2Name) {
          const json2 = XLSX.utils.sheet_to_json(workbook.Sheets[sheet2Name]);
          listenData = json2.map(row => {
            const parsed = parseTopic(row['CHU_DE']);
            return {
              topicRaw: parsed.raw, topicName: parsed.name, topicOrder: parsed.order,
              q: (row['CAU_HOI'] ?? '').toString().trim(),
              a: (row['CAU_TRA_LOI'] ?? '').toString().trim()
            };
          }).filter(i => i.topicName && i.q && i.a);
        }

        renderTopicChips();
        return;
      } catch (err) { console.log('Không đọc được file:', file, err); }
    }
    document.getElementById('question').innerText = 'Không tìm thấy file Excel phù hợp!';
  }

  function currentSourceData() { return mode === 'flashcard' ? flashcardData : listenData; }

  // ===================
  // TOPIC CHIPS
  // ===================
  function getTopicsList() {
    const source = currentSourceData();
    const topicMap = new Map();
    for (const d of source) {
      if (!topicMap.has(d.topicName)) topicMap.set(d.topicName, { name: d.topicName, order: d.topicOrder });
      else if (d.topicOrder < topicMap.get(d.topicName).order) topicMap.set(d.topicName, { name: d.topicName, order: d.topicOrder });
    }
    return Array.from(topicMap.values()).sort((a, b) => a.order === b.order ? a.name.localeCompare(b.name) : a.order - b.order);
  }

  function renderTopicChips() {
    const container = document.getElementById('topicChips');
    const topics = getTopicsList();
    allSelected = true;
    selectedTopics = new Set();

    container.innerHTML = '';

    const allChip = document.createElement('div');
    allChip.className = 'chip all-chip selected';
    allChip.innerText = 'Tất cả';
    allChip.addEventListener('click', () => {
      allSelected = true;
      selectedTopics = new Set();
      refreshChipStyles();
      applyFilter();
    });
    container.appendChild(allChip);

    topics.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.dataset.topic = t.name;
      const prefix = Number.isFinite(t.order) ? `${t.order}-` : '';
      chip.innerText = prefix + t.name;
      chip.addEventListener('click', () => {
        allSelected = false;
        if (selectedTopics.has(t.name)) selectedTopics.delete(t.name);
        else selectedTopics.add(t.name);
        if (selectedTopics.size === 0) allSelected = true;
        refreshChipStyles();
        applyFilter();
      });
      container.appendChild(chip);
    });

    document.getElementById('emptyNote').innerText =
      (topics.length === 0 && mode === 'listen') ? 'Chưa có dữ liệu Listen & Answer cho các unit này.' : '';

    refreshChipStyles();
    applyFilter();
  }

  function refreshChipStyles() {
    const container = document.getElementById('topicChips');
    const allChip = container.querySelector('.all-chip');
    allChip.classList.toggle('selected', allSelected);
    container.querySelectorAll('.chip:not(.all-chip)').forEach(chip => {
      chip.classList.toggle('selected', !allSelected && selectedTopics.has(chip.dataset.topic));
    });
  }

  function applyFilter() {
    const source = currentSourceData();
    filteredData = allSelected ? [...source] : source.filter(i => selectedTopics.has(i.topicName));

    usedIndexes = [];
    updateProgress(0, filteredData.length);
    document.getElementById('nextBtn').disabled = filteredData.length === 0;
    document.getElementById('showAnswerBtn').disabled = true;

    const qEl = document.getElementById('question');
    qEl.classList.toggle('compact', mode === 'listen');

    hideAnswer();

    if (filteredData.length > 0) {
      nextQuestion();
    } else {
      qEl.innerText = source.length === 0
        ? (mode === 'listen' ? 'Chưa có dữ liệu Listen & Answer.' : 'Chưa có dữ liệu.')
        : 'Vui lòng chọn ít nhất một chủ đề!';
    }
  }

  function updateProgress(done, total) {
    document.getElementById('progressText').innerText = `${done}/${total}`;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function hideAnswer() {
    document.getElementById('answerBlock').classList.remove('show');
    document.getElementById('answer').innerText = '';
    document.getElementById('ipa').innerText = '';
  }

  // ===================
  // CÂU HỎI
  // ===================
  function nextQuestion() {
    if (filteredData.length === 0) return;
    if (usedIndexes.length === filteredData.length) usedIndexes = [];

    const available = filteredData.map((_, i) => i).filter(i => !usedIndexes.includes(i));
    currentIndex = available[Math.floor(Math.random() * available.length)];
    usedIndexes.push(currentIndex);

    const q = filteredData[currentIndex];
    hideAnswer();

    if (mode === 'flashcard') {
      document.getElementById('question').innerText = q.vi;
      document.getElementById('answer').innerText = q.en;
    } else {
      document.getElementById('question').innerText = q.q;
      document.getElementById('answer').innerText = q.a;
    }

    updateProgress(usedIndexes.length, filteredData.length);
    document.getElementById('showAnswerBtn').disabled = false;

    const speakLang = mode === 'flashcard' ? 'vi-VN' : 'en-US';
    const speakContent = mode === 'flashcard' ? q.vi : q.q;
    if (canAutoSpeak) speakText(speakContent, speakLang, speakLang === 'vi-VN' ? viSpeedPreset : 1);
    else { pendingSpeakText = speakContent; pendingSpeakLang = speakLang; }
  }

  function showAnswer() {
    const text = document.getElementById('answer').innerText;
    document.getElementById('answerBlock').classList.add('show');

    if (mode === 'flashcard') {
      const q = filteredData[currentIndex];
      const ipaEl = document.getElementById('ipa');
      if (q?.ipa) {
        const t = q.ipa.trim();
        ipaEl.innerText = /^\/.*\/$/.test(t) ? t : `/${t}/`;
      } else ipaEl.innerText = '';
    }
    speakText(text, 'en-US', 1);
  }

  function replayCurrent() {
    if (currentIndex < 0 || !filteredData[currentIndex]) return;
    const q = filteredData[currentIndex];
    const answerShown = document.getElementById('answerBlock').classList.contains('show');
    if (answerShown) {
      speakText(document.getElementById('answer').innerText, 'en-US', 1);
    } else {
      const speakLang = mode === 'flashcard' ? 'vi-VN' : 'en-US';
      const speakContent = mode === 'flashcard' ? q.vi : q.q;
      speakText(speakContent, speakLang, speakLang === 'vi-VN' ? viSpeedPreset : 1);
    }
  }

  // ===================
  // CHUYỂN CHẾ ĐỘ
  // ===================
  function switchMode(newMode) {
    if (mode === newMode) return;
    mode = newMode;
    document.getElementById('modeFlashcard').classList.toggle('active', mode === 'flashcard');
    document.getElementById('modeListen').classList.toggle('active', mode === 'listen');
    renderTopicChips();
  }

  // ===================
  // CÀI ĐẶT GIỌNG ĐỌC
  // ===================
  function initSettingsPanel() {
    const toggle = document.getElementById('settingsToggle');
    const panel = document.getElementById('settingsPanel');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      panel.classList.toggle('open');
    });

    document.getElementById('voiceViSelect').addEventListener('change', (e) => {
      selectedViVoice = e.target.value;
      localStorage.setItem('uspeak_vi_voice', selectedViVoice);
    });
    document.getElementById('voiceEnSelect').addEventListener('change', (e) => {
      selectedEnVoice = e.target.value;
      localStorage.setItem('uspeak_en_voice', selectedEnVoice);
    });

    const speedBtns = document.querySelectorAll('.speed-btn');
    speedBtns.forEach(btn => {
      const val = parseFloat(btn.dataset.speed);
      btn.classList.toggle('active', val === viSpeedPreset);
      btn.addEventListener('click', () => {
        viSpeedPreset = val;
        localStorage.setItem('uspeak_vi_speed', String(val));
        speedBtns.forEach(b => b.classList.toggle('active', b === btn));
        if (mode === 'flashcard' && currentIndex >= 0 && filteredData[currentIndex]) {
          speakText(filteredData[currentIndex].vi, 'vi-VN', viSpeedPreset);
        }
      });
    });
  }

  // ===================
  // SỰ KIỆN
  // ===================
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);
  document.getElementById('replayBtn').addEventListener('click', replayCurrent);
  document.getElementById('modeFlashcard').addEventListener('click', () => switchMode('flashcard'));
  document.getElementById('modeListen').addEventListener('click', () => switchMode('listen'));

  initSettingsPanel();
  tryLoadExcelFiles();
</script>
</body>
</html>
